<!DOCTYPE html>
<html>
<head>
    <title>Attendance System</title>
</head>
<body>

<h1>Student Attendance System</h1>

<h2>Add Student</h2>
<input id="reg" placeholder="Reg Number">
<input id="name" placeholder="Full Name">
<button onclick="addStudent()">Add</button>

<h2>Create Session</h2>
<input id="date" placeholder="YYYY-MM-DD">
<button onclick="createSession()">Create</button>

<h2>Mark Attendance</h2>
<input id="student_id" placeholder="Student ID">
<input id="session_date" placeholder="YYYY-MM-DD">
<select id="status">
    <option>PRESENT</option>
    <option>ABSENT</option>
    <option>LATE</option>
</select>
<button onclick="markAttendance()">Submit</button>

<h2>Get Summary</h2>
<input id="summary_id" placeholder="Student ID">
<button onclick="getSummary()">Get Summary</button>

<pre id="output"></pre>

<script>
/** Same-origin relative URLs so the page works when served from Flask (any host/port). */
const API = (path) => (path.startsWith("/") ? path : `/${path}`);

function show(data) {
    document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}

async function handleJsonResponse(r) {
    const text = await r.text();
    let data;
    try {
        data = text ? JSON.parse(text) : null;
    } catch {
        data = { error: "Invalid JSON from server", raw: text };
    }
    if (!r.ok) {
        data = data && typeof data === "object" && "error" in data ? data : { error: data ?? text, status: r.status };
    }
    show(data);
}

function addStudent() {
    fetch(API("/students"), {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            reg_number: document.getElementById("reg").value,
            full_name: document.getElementById("name").value
        })
    }).then(handleJsonResponse);
}

function createSession() {
    fetch(API("/sessions"), {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            session_date: document.getElementById("date").value
        })
    }).then(handleJsonResponse);
}

function markAttendance() {
    fetch(API("/attendance"), {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            student_id: parseInt(document.getElementById("student_id").value),
            session_date: document.getElementById("session_date").value,
            status: document.getElementById("status").value
        })
    }).then(handleJsonResponse);
}

function getSummary() {
    const id = document.getElementById("summary_id").value;
    fetch(API(`/students/${encodeURIComponent(id)}/attendance-summary`)).then(handleJsonResponse);
}
</script>

</body>
</html>
