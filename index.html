<!DOCTYPE html>
<html>
<head>
    <title>Attendance System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0056b3;
        }

        pre {
            background: #111;
            color: #0f0;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
        }
    </style>
</head>
<body>

<h1> Student Attendance System</h1>

<div class="container">

    <div class="card">
        <h2>Add Student</h2>
        <input id="reg" placeholder="Reg Number">
        <input id="name" placeholder="Full Name">
        <button onclick="addStudent()">Add Student</button>
    </div>

    <div class="card">
        <h2>Create Session</h2>
        <input type="date" id="date">
        <button onclick="createSession()">Create Session</button>
    </div>

    <div class="card">
        <h2>Mark Attendance</h2>
        <input id="student_id" placeholder="Student ID">
        <input type="date" id="session_date">
        <select id="status">
            <option>PRESENT</option>
            <option>ABSENT</option>
            <option>LATE</option>
        </select>
        <button onclick="markAttendance()">Submit Attendance</button>
    </div>

    <div class="card">
        <h2>Get Summary</h2>
        <input id="summary_id" placeholder="Student ID">
        <button onclick="getSummary()">Get Summary</button>
    </div>

    <div class="card">
        <h2>Output</h2>
        <pre id="output"></pre>
    </div>

</div>

<script>
const BASE = "http://127.0.0.1:5000";

function show(data) {
    document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}

function addStudent() {
    fetch(BASE + "/students", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            reg_number: document.getElementById("reg").value,
            full_name: document.getElementById("name").value
        })
    }).then(r => r.json()).then(show);
}

function createSession() {
    fetch(BASE + "/sessions", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            session_date: document.getElementById("date").value
        })
    }).then(r => r.json()).then(show);
}

function markAttendance() {
    fetch(BASE + "/attendance", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            student_id: parseInt(document.getElementById("student_id").value),
            session_date: document.getElementById("session_date").value,
            status: document.getElementById("status").value
        })
    }).then(r => r.json()).then(show);
}

function getSummary() {
    const id = document.getElementById("summary_id").value;
    fetch(BASE + "/students/" + id + "/attendance-summary")
        .then(r => r.json())
        .then(show);
}
</script>

</body>
</html>
